# WARNING: Do not store sensitive information in this file, as its contents will be included in the Qodana report.

version: "1.0"
linter: jetbrains/qodana-jvm-android:2026.1
bootstrap: |
  ./gradlew :sharedLogic:prepareKotlinIdeaImport :sharedUI:prepareKotlinIdeaImport --no-configuration-cache --no-daemon

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - androidApp
      - .kotlin
      - build

include:
  - name: CheckDependencyLicenses

projectJDK: "17"
properties:
  gradle.ide.support.future.agp.versions: "true"
  idea.max.content.load.filesize: "20000"
  # Propriedades de estabilidade para KMP
  idea.kotlin.pagemap.storage.max.size: "500"
  idea.skip.indices.ms: "10000"
  # Forçar a IDE a não seguir links simbólicos ou pastas de metadados voláteis
  idea.ignore.vfs.recursion: "true"

coverage:
  report: build/reports/kover/report.xml
