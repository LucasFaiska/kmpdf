version: "1.0"
linter: jetbrains/qodana-jvm-android:latest
bootstrap: |
  ./gradlew :sharedLogic:assemble :sharedUI:assemble --no-configuration-cache

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - androidApp
      - .kotlin
      - build

include:
  - name: CheckDependencyLicenses
