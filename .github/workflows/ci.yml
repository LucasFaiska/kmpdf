name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    name: Build, Test and Quality
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      checks: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Run Static Analysis (Detekt & ktlint)
        run: ./gradlew detekt ktlintCheck

      - name: Run Unit Tests and Coverage
        run: ./gradlew koverLog --stacktrace

      - name: Generate Coverage Report
        run: ./gradlew koverXmlReport

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: lucasfaiska/kmpdf

      - name: 'Qodana Scan'
        uses: JetBrains/qodana-action@v2026.1.3
        with:
          use-native: true
          args: >
            --property=gradle.ide.support.future.agp.versions=true
        env:
          QODANA_TOKEN: ${{ secrets.QODANA_TOKEN_1046294260 }}
          QODANA_ENDPOINT: 'https://qodana.cloud'
